[build]
  command = "bash scripts/netlify-build.sh"
  publish = "frontend/.next"
  functions = "netlify/functions"

# @netlify/plugin-nextjs встановлено через Netlify Dashboard (не з netlify.toml)
# https://app.netlify.com/plugins/@netlify/plugin-nextjs/install

[build.environment]
  NEXT_PUBLIC_API_URL = "https://YOUR-SITE.netlify.app/api"

# Всі запити на /api/* перенаправляються до Netlify Function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true
