[build]
  base = "frontend"
  command = "cd .. && npm install && npx prisma generate --schema=backend/prisma/schema.prisma && npm --prefix admin install && NEXT_PUBLIC_API_URL=/api npm --prefix admin run build && mkdir -p frontend/public/admin && cp -r admin/out/. frontend/public/admin/ && cd frontend && npm run build"
  publish = ".next"
  functions = "../netlify/functions"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NEXT_PUBLIC_API_URL = "https://YOUR-SITE.netlify.app/api"

# Всі запити на /api/* перенаправляються до Netlify Function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true
